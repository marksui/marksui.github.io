<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mark Sui - Travel Collections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Regional travel photo collections from Mark Sui's personal archive, grouped by place and visual theme.">
  <meta name="author" content="Mark Sui">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#55645e">
  <link rel="canonical" href="https://marksui.github.io/travel-collections.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Mark Sui">
  <meta property="og:title" content="Mark Sui - Travel Collections">
  <meta property="og:description" content="Regional travel photo collections from Mark Sui's personal archive, grouped by place and visual theme.">
  <meta property="og:url" content="https://marksui.github.io/travel-collections.html">
  <meta property="og:image" content="https://marksui.github.io/img/site-card.png">
  <meta property="og:image:alt" content="Mark Sui portfolio social preview card">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mark Sui - Travel Collections">
  <meta name="twitter:description" content="Regional travel photo collections from Mark Sui's personal archive, grouped by place and visual theme.">
  <meta name="twitter:image" content="https://marksui.github.io/img/site-card.png">
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <script src="travel-data.js"></script>
  <script src="travel-shared.js"></script>
  <style>
    .collections-main {
      max-width: 1240px;
      --collections-accent: #55645e;
      --collections-secondary: #7b7467;
      --collections-rule: #d9d5cc;
      --collections-wash: rgba(85, 100, 94, 0.065);
      --collections-panel: rgba(255, 255, 255, 0.8);
      --collections-shadow: 0 18px 46px rgba(53, 55, 49, 0.08);
      --collections-ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html[data-theme="dark"] .collections-main {
      --collections-accent: #a8b6ae;
      --collections-secondary: #b8b0a3;
      --collections-rule: #3f423f;
      --collections-wash: rgba(168, 182, 174, 0.08);
      --collections-panel: rgba(24, 24, 24, 0.76);
      --collections-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    }

    .travel-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 1.5rem;
      align-items: end;
      padding-bottom: 1.45rem;
      border-bottom: 1px solid var(--collections-rule);
      animation: collectionsFadeUp 0.62s var(--collections-ease) both;
    }

    .travel-kicker {
      margin: 0 0 0.45rem;
      color: var(--collections-accent);
      font-size: 0.92rem;
      font-weight: bold;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .travel-copy h2 {
      margin: 0 0 0.6rem;
      max-width: 11em;
      font-family: var(--display-serif);
      font-size: 2.72rem;
      line-height: 1.02;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .travel-copy p {
      margin: 0;
      max-width: 680px;
      opacity: 0.84;
      font-size: 1.05rem;
    }

    .travel-local-nav {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.32rem;
      margin-top: 1.1rem;
      padding: 0.28rem;
      border: 1px solid var(--collections-rule);
      border-radius: 999px;
      background: var(--collections-panel);
      box-shadow: var(--collections-shadow);
    }

    .travel-local-nav a {
      padding: 0.3rem 0.74rem;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      transition: transform 0.24s var(--collections-ease), background 0.24s ease, color 0.24s ease;
    }

    .travel-local-nav a:hover,
    .travel-local-nav a:focus-visible,
    .travel-local-nav a[aria-current="page"] {
      background: var(--collections-wash);
      color: var(--collections-accent);
      transform: translateY(-1px);
    }

    .collections-glance {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .collections-glance article {
      padding: 0.9rem 0.95rem;
      border: 1px solid var(--collections-rule);
      border-radius: 8px;
      background:
        linear-gradient(180deg, var(--collections-wash), transparent 78%),
        var(--collections-panel);
      box-shadow: var(--collections-shadow);
    }

    .collections-glance strong {
      display: block;
      color: var(--collections-accent);
      font-size: 1.42rem;
      line-height: 1;
    }

    .collections-glance span {
      display: block;
      margin-top: 0.26rem;
      color: var(--collections-secondary);
      font-size: 0.86rem;
      line-height: 1.2;
    }

    .collections-shell {
      margin-top: 1.4rem;
      animation: collectionsFadeUp 0.7s var(--collections-ease) both;
    }

    .collections-filter-bar {
      position: sticky;
      top: 0.7rem;
      z-index: 8;
      display: grid;
      gap: 0.72rem;
      padding: 0.72rem;
      border: 1px solid var(--collections-rule);
      border-radius: 8px;
      background: color-mix(in srgb, var(--collections-panel) 92%, var(--surface) 8%);
      box-shadow: 0 12px 32px rgba(53, 55, 49, 0.075);
      backdrop-filter: blur(10px);
    }

    .region-filter-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.15rem;
      scrollbar-width: thin;
    }

    .collections-filter-note {
      margin: 0;
      color: var(--collections-secondary);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .filter-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 0.42rem;
      padding: 0.34rem 0.76rem;
      border: 1px solid var(--collections-rule);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      line-height: 1.2;
      white-space: nowrap;
      transition: transform 0.24s var(--collections-ease), border-color 0.24s ease, color 0.24s ease, background 0.24s ease;
    }

    .filter-chip:hover,
    .filter-chip:focus-visible,
    .filter-chip.active {
      border-color: var(--collections-accent);
      color: var(--collections-accent);
      background: var(--collections-wash);
      transform: translateY(-1px);
    }

    .filter-chip small {
      color: var(--collections-secondary);
      font-size: 0.8rem;
      line-height: 1.1;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 2.2rem 0 0.85rem;
      color: var(--collections-accent);
      font-family: var(--display-serif);
      font-size: 1.12rem;
      font-style: italic;
      font-weight: 500;
    }

    .section-heading::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--collections-rule), transparent);
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .collection-card {
      display: grid;
      grid-template-columns: minmax(220px, 0.86fr) minmax(0, 1fr);
      gap: 0;
      border: 1px solid var(--collections-rule);
      border-radius: 8px;
      background: var(--collections-panel);
      box-shadow: var(--collections-shadow);
      overflow: hidden;
      transition: transform 0.3s var(--collections-ease), border-color 0.24s ease;
    }

    .collection-card:hover,
    .collection-card:focus-within {
      transform: translateY(-3px);
      border-color: var(--collections-accent);
    }

    .collection-cover {
      position: relative;
      display: block;
      min-height: 250px;
      background: linear-gradient(180deg, var(--collections-wash), transparent 48%), var(--tag-bg);
      overflow: hidden;
    }

    .collection-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.34s var(--collections-ease), filter 0.28s ease;
    }

    .collection-card:hover .collection-cover img,
    .collection-card:focus-within .collection-cover img {
      transform: scale(1.02);
      filter: saturate(0.94) contrast(1.02);
    }

    .collection-content {
      display: grid;
      align-content: start;
      gap: 0.8rem;
      padding: 1rem 1rem 1.05rem;
    }

    .collection-title {
      display: grid;
      gap: 0.3rem;
    }

    .collection-title span {
      color: var(--collections-accent);
      font-size: 0.84rem;
      line-height: 1.2;
    }

    .collection-title-topline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .collection-rank {
      color: var(--collections-secondary);
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .collection-title h3 {
      margin: 0;
      font-size: 1.34rem;
      line-height: 1.12;
    }

    .collection-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, max-content));
      gap: 0.45rem;
      margin: 0;
      padding: 0;
      list-style: none;
      align-items: start;
      justify-content: start;
    }

    .collection-stats li {
      margin: 0;
      display: inline-flex;
      align-items: center;
      padding: 0.18rem 0.48rem;
      border: 1px solid var(--collections-rule);
      border-radius: 999px;
      color: var(--collections-secondary);
      font-size: 0.84rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    .collection-places {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .collection-places li {
      margin: 0;
      display: inline-flex;
      align-items: center;
      padding: 0.16rem 0.46rem;
      border: 1px solid rgba(85, 100, 94, 0.16);
      border-radius: 999px;
      color: var(--text);
      font-size: 0.86rem;
      line-height: 1.2;
    }

    html[data-theme="dark"] .collection-places li {
      border-color: rgba(168, 182, 174, 0.16);
    }

    .collection-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.6rem;
      margin-top: 0.15rem;
    }

    .collection-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      width: 100%;
      padding: 0.36rem 0.78rem;
      border: 1px solid var(--collections-rule);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.24s var(--collections-ease), border-color 0.24s ease, color 0.24s ease, background 0.24s ease;
    }

    .collection-actions a:hover,
    .collection-actions a:focus-visible {
      transform: translateY(-1px);
      border-color: var(--collections-accent);
      color: var(--collections-accent);
      background: var(--collections-wash);
    }

    .spotlight-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .spotlight-card {
      display: grid;
      gap: 0.75rem;
      padding: 0.9rem;
      border: 1px solid var(--collections-rule);
      border-radius: 8px;
      background: var(--collections-panel);
      box-shadow: var(--collections-shadow);
      color: var(--text);
      text-decoration: none;
      transition: transform 0.3s var(--collections-ease), border-color 0.24s ease;
    }

    .spotlight-card:hover,
    .spotlight-card:focus-visible {
      transform: translateY(-3px);
      border-color: var(--collections-accent);
    }

    .spotlight-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 6px;
      object-fit: cover;
      background: var(--collections-wash);
    }

    .spotlight-card span {
      display: block;
      color: var(--collections-accent);
      font-size: 0.84rem;
      line-height: 1.2;
    }

    .spotlight-card strong {
      display: block;
      margin-top: 0.2rem;
      font-size: 1.06rem;
      line-height: 1.16;
    }

    .spotlight-card p {
      margin: 0.32rem 0 0;
      color: var(--text);
      opacity: 0.84;
      font-size: 0.92rem;
      line-height: 1.36;
    }

    .collections-empty {
      padding: 1.5rem 1rem;
      border: 1px dashed var(--collections-rule);
      border-radius: 8px;
      color: var(--collections-secondary);
      text-align: center;
      background: var(--collections-wash);
    }

    @keyframes collectionsFadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1060px) {
      .travel-hero,
      .collection-grid,
      .spotlight-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .travel-local-nav {
        display: flex;
        flex-wrap: nowrap;
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.26rem;
        box-sizing: border-box;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .travel-local-nav::-webkit-scrollbar {
        display: none;
      }

      .travel-local-nav a {
        flex: 0 0 auto;
      }

      .travel-copy h2 {
        max-width: none;
        font-size: 2.14rem;
      }

      .travel-copy p {
        font-size: 1rem;
      }

      .collections-glance {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .collections-glance article {
        padding: 0.75rem 0.68rem;
      }

      .collections-glance strong {
        font-size: 1.18rem;
      }

      .collections-glance span {
        font-size: 0.75rem;
      }

      .collection-card {
        grid-template-columns: 1fr;
      }

      .collection-cover {
        min-height: 200px;
      }

      .collection-content {
        gap: 0.66rem;
        padding: 0.82rem 0.88rem 0.9rem;
      }

      .collection-title h3 {
        font-size: 1.15rem;
      }

      .collection-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.35rem;
      }

      .collection-actions {
        grid-template-columns: 1fr;
      }

      .collection-places {
        gap: 0.34rem;
      }

      .collection-places li {
        font-size: 0.8rem;
      }

      .collection-actions {
        gap: 0.45rem;
      }

      .collection-actions a {
        padding: 0.34rem 0.68rem;
        font-size: 0.88rem;
      }

      .collection-stats li,
      .collection-places li {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mark Sui</h1>
    <nav>
      <a href="index.html">About</a>
      <a href="education.html">Education</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="personal.html" aria-current="page">Personal</a>
    </nav>
  </header>

  <main class="collections-main">
    <section class="travel-hero">
      <div class="travel-copy">
        <p class="travel-kicker">Collections</p>
        <h2>Grouped by region.</h2>
        <p>A broader view of the archive.</p>
        <nav class="travel-local-nav" aria-label="Personal pages">
          <a href="personal.html">Overview</a>
          <a href="travel-gallery.html">Gallery</a>
          <a href="travel-map.html">Places Map</a>
          <details class="nav-more">
            <summary>More</summary>
            <div class="nav-more-menu">
              <a href="travel-tree.html">Tree</a>
              <a href="travel-collections.html" aria-current="page">Collections</a>
            </div>
          </details>
        </nav>
      </div>

      <div class="collections-glance" aria-label="Collection totals">
        <article>
          <strong id="collections-region-count">0</strong>
          <span>Regions</span>
        </article>
        <article>
          <strong id="collections-place-count">0</strong>
          <span>Places</span>
        </article>
        <article>
          <strong id="collections-photo-count">0</strong>
          <span>Photos</span>
        </article>
      </div>
    </section>

    <section class="collections-shell">
      <div class="collections-filter-bar">
        <div class="region-filter-row" id="collection-region-filters"></div>
        <p class="collections-filter-note" id="collections-filter-note"></p>
      </div>

      <section>
        <h2 class="section-heading">Regional Sets</h2>
        <div class="collection-grid" id="collection-grid"></div>
      </section>

      <section>
        <h2 class="section-heading">Dense Place Sets</h2>
        <div class="spotlight-grid" id="spotlight-grid"></div>
      </section>
    </section>
  </main>

  <script>
    (function() {
      var shared = window.travelShared;
      var photoRegions = shared.uniqueRegions({ onlyWithPhotos: true });
      var params = new URLSearchParams(window.location.search);
      var currentRegion = photoRegions.indexOf(params.get("region")) >= 0 ? params.get("region") : "All";
      var regionFilters = document.getElementById("collection-region-filters");
      var collectionGrid = document.getElementById("collection-grid");
      var spotlightGrid = document.getElementById("spotlight-grid");
      var filterNote = document.getElementById("collections-filter-note");

      function regionPlaces(region) {
        return shared.placesWithPhotos(region === "All" ? "" : region).slice().sort(shared.comparePlaces);
      }

      function regionPhotoTotal(region) {
        return regionPlaces(region).reduce(function(total, place) {
          return total + shared.countPhotosForPlace(place);
        }, 0);
      }

      function regionCover(region) {
        var places = regionPlaces(region);
        if (!places.length) {
          return "";
        }
        return places[0].photos[0].src;
      }

      function updateUrl() {
        var next = new URLSearchParams();
        if (currentRegion !== "All") {
          next.set("region", currentRegion);
        }
        var query = next.toString();
        var nextUrl = query ? window.location.pathname + "?" + query : window.location.pathname;
        history.replaceState(null, "", nextUrl);
      }

      function renderFilters() {
        var regions = ["All"].concat(photoRegions);
        regionFilters.innerHTML = regions.map(function(region) {
          var active = region === currentRegion;
          var label = region === "All" ? "All" : shared.htmlLabel(region, shared.data.regionLocalNames[region]);
          var count = region === "All"
            ? shared.totalPhotoCount()
            : regionPhotoTotal(region);
          return '' +
            '<button class="filter-chip' + (active ? ' active' : '') + '" type="button" data-region="' + shared.escapeHtml(region) + '" aria-pressed="' + String(active) + '">' +
              '<span>' + label + '</span>' +
              '<small>' + count + '</small>' +
            '</button>';
        }).join("");

        regionFilters.querySelectorAll("[data-region]").forEach(function(button) {
          button.addEventListener("click", function() {
            currentRegion = button.dataset.region;
            updateAll();
          });
        });
      }

      function renderStats() {
        var places = regionPlaces(currentRegion);
        var regions = currentRegion === "All" ? photoRegions.length : 1;
        document.getElementById("collections-region-count").textContent = regions;
        document.getElementById("collections-place-count").textContent = places.length;
        document.getElementById("collections-photo-count").textContent = places.reduce(function(total, place) {
          return total + shared.countPhotosForPlace(place);
        }, 0);
      }

      function collectionCardHtml(region, rank) {
        var places = regionPlaces(region);
        if (!places.length) {
          return "";
        }

        var coverSrc = shared.thumbnailSrc(regionCover(region));
        var leadPlaces = places.slice(0, 5);
        var photoCount = places.reduce(function(total, place) {
          return total + shared.countPhotosForPlace(place);
        }, 0);
        return '' +
          '<article class="collection-card">' +
            '<a class="collection-cover" href="travel-gallery.html?region=' + encodeURIComponent(region) + '">' +
              '<img src="' + shared.escapeHtml(coverSrc) + '" alt="' + shared.escapeHtml(region + ' collection cover') + '" loading="lazy" decoding="async">' +
            '</a>' +
            '<div class="collection-content">' +
              '<div class="collection-title">' +
                '<div class="collection-title-topline">' +
                  '<span>Collection</span>' +
                  '<span class="collection-rank">#' + rank + '</span>' +
                '</div>' +
                '<h3>' + shared.htmlLabel(region, shared.data.regionLocalNames[region]) + '</h3>' +
              '</div>' +
              '<ul class="collection-stats">' +
                '<li>' + places.length + ' places</li>' +
                '<li>' + photoCount + ' photos</li>' +
              '</ul>' +
              '<ul class="collection-places">' +
                leadPlaces.map(function(place) {
                  return '<li>' + shared.htmlLabel(place.name, place.localName) + '</li>';
                }).join("") +
              '</ul>' +
              '<div class="collection-actions">' +
                '<a href="travel-gallery.html?region=' + encodeURIComponent(region) + '">Gallery</a>' +
                '<a href="travel-map.html?region=' + encodeURIComponent(region) + '">Places Map</a>' +
                '<a href="travel-tree.html?region=' + encodeURIComponent(region) + '">Tree</a>' +
              '</div>' +
            '</div>' +
          '</article>';
      }

      function renderCollections() {
        var regions = currentRegion === "All" ? photoRegions : [currentRegion];
        var html = regions.map(function(region, index) {
          return collectionCardHtml(region, index + 1);
        }).join("");
        collectionGrid.innerHTML = html || '<div class="collections-empty">Nothing is showing here yet.</div>';
      }

      function renderSpotlights() {
        var places = regionPlaces(currentRegion).slice(0, 9);
        if (!places.length) {
          spotlightGrid.innerHTML = '<div class="collections-empty">No place cards for this region yet.</div>';
          return;
        }

        spotlightGrid.innerHTML = places.map(function(place) {
          var firstPhoto = place.photos[0];
          var cover = shared.thumbnailSrc(firstPhoto.src);
          var label = shared.placeLabel(place);
          var photoCount = shared.countPhotosForPlace(place);
          var leadSpots = (place.spots || []).slice(0, 2).map(function(spot, index) {
            var localSpot = place.spotsLocal ? place.spotsLocal[index] : "";
            return shared.textLabel(spot, localSpot);
          }).join(" · ");
          return '' +
            '<a class="spotlight-card" href="travel-gallery.html?region=' + encodeURIComponent(place.region) + '&place=' + encodeURIComponent(place.name) + '">' +
              '<img src="' + shared.escapeHtml(cover) + '" alt="' + shared.escapeHtml(label) + '" loading="lazy" decoding="async">' +
              '<div>' +
                '<span>' + shared.htmlLabel(place.region, shared.data.regionLocalNames[place.region]) + '</span>' +
                '<strong>' + shared.htmlLabel(place.name, place.localName) + '</strong>' +
                '<p>' + (leadSpots || (photoCount + ' photos here.')) + '</p>' +
              '</div>' +
            '</a>';
        }).join("");
      }

      function updateAll() {
        updateUrl();
        renderFilters();
        renderStats();
        renderCollections();
        renderSpotlights();
        filterNote.textContent = currentRegion === "All"
          ? "Sorted by photo count across the whole archive."
          : "Showing this region first, then the places with the most photos.";
      }

      updateAll();
    })();
  </script>
</body>
</html>
